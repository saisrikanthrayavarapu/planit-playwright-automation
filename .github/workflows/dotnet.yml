# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Install Playwright Browsers
      run: dotnet tool install --global Microsoft.Playwright.CLI && playwright install
    - name: Test
      env:
        GHAC: true
      run: dotnet test --no-build --verbosity normal
    - name: Generate Playwright Test Report
      run: |
        echo "Creating Playwright report bundle..."
        mkdir -p playwright-report
        if [ -d "TestResults" ]; then
          cp -R TestResults/* playwright-report/
        fi
        if command -v playwright > /dev/null; then
          if [ -d "playwright-report" ]; then
            echo "Playwright report data prepared at playwright-report/"
          fi
        fi
    - name: Archive Reports
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report
