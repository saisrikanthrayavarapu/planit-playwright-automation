# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Install Playwright Browsers
      run: dotnet tool install --global Microsoft.Playwright.CLI && playwright install
    - name: Test
      env:
        GHAC: true
      run: dotnet test --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory TestResults
    - name: Generate Playwright/TestResults Report Bundle
      run: |
        echo "Creating report bundle from TestResults..."
        mkdir -p playwright-report
        if [ -d "TestResults" ] && [ "$(ls -A TestResults)" ]; then
          cp -R TestResults/* playwright-report/
          echo "Copied TestResults to playwright-report."
        else
          echo "No TestResults files found; creating placeholder." > playwright-report/README.txt
        fi
        ls -al playwright-report
    - name: Archive Reports
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report
        if-no-files-found: warn
        compression-level: 6
        overwrite: false
        include-hidden-files: false
