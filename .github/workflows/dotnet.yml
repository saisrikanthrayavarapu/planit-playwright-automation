# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Clean existing artifacts
      run: |
        echo "Cleaning previous run artifacts..."
        rm -rf TestResults playwright-report
        mkdir -p TestResults playwright-report
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Install Playwright Browsers
      run: dotnet tool install --global Microsoft.Playwright.CLI && playwright install
    - name: Test
      env:
        GHAC: true
      run: dotnet test --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory TestResults
    - name: Generate Test Report HTML
      run: |
        echo "Generating HTML report from TRX results..."
        dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.1.21
        reportgenerator -reports:TestResults/*.trx -targetdir:playwright-report -reporttypes:HtmlInline_AzurePipelines
        ls -al playwright-report
    - name: Archive Reports
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report
        if-no-files-found: warn
        compression-level: 6
        overwrite: false
        include-hidden-files: false
